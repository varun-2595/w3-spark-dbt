# Run against the standalone cluster (2 workers) — NOT local mode.
# Without this, spark-submit silently runs local[*] and the app never appears
# in the master UI at :8080 (checkpoint: jobs visible in Spark UI).
spark.master                           spark://spark-master:7077

# Executor sizing: 2 cores / 2g per executor. With 2 workers capped at
# 4 cores / 8G each (docker-compose), this yields up to 4 executors and
# never over-requests a local machine. (6 cores per executor was oversized
# for a 2-worker local cluster.)
spark.executor.memory                  2g
spark.executor.cores                   2

spark.sql.extensions                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.demo                 org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.demo.type            rest
spark.sql.catalog.demo.uri             http://rest-catalog:8181
# S3FileIO is Iceberg's native S3 implementation (multipart upload, retry
# tuning) and matches CATALOG_IO__IMPL on the REST catalog container.
# Requires the iceberg-aws-bundle package on the Spark classpath (see the
# spark-submit --packages list in the README).
spark.sql.catalog.demo.io-impl         org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.demo.warehouse       s3a://warehouse/
spark.sql.catalog.demo.s3.endpoint     http://minio:9000
spark.sql.catalog.demo.s3.path-style-access true
spark.sql.catalog.demo.s3.access-key-id minioadmin
spark.sql.catalog.demo.s3.secret-access-key minioadmin
spark.sql.catalog.demo.client.region   us-east-1

# Enable S3A filesystem access for raw S3 data reads/writes (zone lookup CSV)
spark.hadoop.fs.s3a.endpoint           http://minio:9000
spark.hadoop.fs.s3a.access.key         minioadmin
spark.hadoop.fs.s3a.secret.key         minioadmin
spark.hadoop.fs.s3a.path.style.access  true
spark.hadoop.fs.s3a.impl               org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.connection.ssl.enabled false

# Map s3:// scheme to S3AFileSystem implementation
spark.hadoop.fs.s3.impl                 org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3.endpoint             http://minio:9000
spark.hadoop.fs.s3.access.key           minioadmin
spark.hadoop.fs.s3.secret.key           minioadmin
spark.hadoop.fs.s3.path.style.access    true
spark.hadoop.fs.s3.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3.connection.ssl.enabled false
