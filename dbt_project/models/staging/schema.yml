version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: taxi_trips
      - name: taxi_zones

models:
  - name: stg_taxi_trips
    description: >
      Cleaned, deduplicated yellow taxi trips. trip_fingerprint is a SHA-256
      hash over all normalized business columns — identical to the fingerprint
      generated by src/pyspark_pipeline.py, enabling cross-system joins.
    columns:
      - name: trip_fingerprint
        description: SHA-256 dedup key (lowercase hex), matches the Spark pipeline.
        tests:
          - unique
          - not_null
      - name: pickup_datetime
        tests:
          - not_null
      - name: dropoff_datetime
        tests:
          - not_null
      - name: fare_amount
        tests:
          - not_null
      - name: pickup_location_id
        tests:
          - not_null
      - name: dropoff_location_id
        tests:
          - not_null

  - name: stg_taxi_zones
    columns:
      - name: location_id
        tests:
          - unique
          - not_null
