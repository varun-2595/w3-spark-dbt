version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: w3_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: catalog_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_w3:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    container_name: w3_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION_NAME: us-east-1
      MINIO_REGION: us-east-1
    volumes:
      - minio_data_w3:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  rest-catalog:
    image: apache/iceberg-rest-fixture:latest
    container_name: w3_rest_catalog
    ports:
      - "8181:8181"
    volumes:
      - ./postgresql-42.7.3.jar:/usr/lib/iceberg-rest/postgresql-42.7.3.jar
    command: ["java", "-cp", "iceberg-rest-adapter.jar:postgresql-42.7.3.jar", "org.apache.iceberg.rest.RESTCatalogServer"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_ACCESS__KEY__ID=minioadmin
      - CATALOG_S3_SECRET__ACCESS__KEY=minioadmin
      - CATALOG_S3_PATH__STYLE__ACCESS=true
      - CATALOG_S3_SSL__ENABLED=false
      - CATALOG_S3_CHECKSUM__ALGORITHM=NONE
      - CATALOG_S3_CHUNKED__ENCODING__ENABLED=false
      - CATALOG_S3_ENABLE__TRAILING__CHECKSUMS=false
      - CATALOG_S3_REGION=us-east-1
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      - "CATALOG_URI=jdbc:postgresql://postgres:5432/catalog_db"
      - CATALOG_JDBC_USER=postgres
      - CATALOG_JDBC_PASSWORD=postgres
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 15s
      timeout: 10s
      retries: 5

  spark-master:
    image: spark:3.5.3
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"   # driver Spark UI (DAG visualization for spark-submit jobs)
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - .:/opt/spark/workspace
    depends_on:
      rest-catalog:
        condition: service_healthy

  spark-worker-1:
    image: spark:3.5.3
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - .:/opt/spark/workspace
    depends_on:
      - spark-master

  spark-worker-2:
    image: spark:3.5.3
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - .:/opt/spark/workspace
    depends_on:
      - spark-master

volumes:
  postgres_data_w3:
  minio_data_w3:
